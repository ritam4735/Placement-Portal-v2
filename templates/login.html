<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
background:linear-gradient(-45deg,#e3f2fd,#bbdefb,#e1bee7,#c8e6c9,#c70a72);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

</style>

</head>



<body>

<div id="app" class="container-fluid vh-100">

<div class="row h-100">


<!-- LEFT SIDE -->

<div class="col-lg-6 d-flex justify-content-center align-items-center">

<img src="/static/logo.png" class="img-fluid w-75">

</div>



<!-- RIGHT SIDE -->

<div class="col-lg-6 d-flex justify-content-center align-items-center">

<div class="card shadow-lg p-4 w-75">


<!-- LOGIN -->

<div v-if="mode==='login'">

<h3 class="fw-bold">Login</h3>

<form @submit.prevent="login">

<div class="mb-3">

<label>Login As</label>

<select v-model="loginForm.role" class="form-select" required>

<option value="">Select</option>
<option value="student">Student</option>
<option value="company">Company</option>
<option value="employee">Employee</option>

</select>

</div>


<div class="mb-3">

<label>Email / Username</label>

<input v-model="loginForm.email" class="form-control" required>

</div>


<div class="mb-3">

<label>Password</label>

<input type="password" v-model="loginForm.password" class="form-control" required>

</div>


<button class="btn btn-primary w-100">

Login

</button>

</form>


<p class="text-center mt-3">

New here?

<button class="btn btn-link p-0" @click="mode='register'">

Register

</button>

</p>

</div>




<!-- REGISTER -->

<div v-if="mode==='register'">

<h3 class="fw-bold">Register</h3>

<form @submit.prevent="register">

<div class="mb-3">

<label>Register As</label>

<select v-model="registerForm.role" class="form-select" required>

<option value="">Select</option>
<option value="student">Student</option>
<option value="company">Company</option>
<option value="employee">Employee</option>

</select>

</div>


<div class="mb-3">

<label>Email</label>

<input v-model="registerForm.email" class="form-control" required>

</div>



<!-- STUDENT FIELDS -->

<div v-if="registerForm.role==='student'">

<div class="mb-3">

<label>Name</label>

<input v-model="registerForm.name" class="form-control">

</div>

<div class="mb-3">

<label>Age</label>

<input type="number" v-model="registerForm.age" class="form-control">

</div>

<div class="mb-3">

<label>Gender</label>

<select v-model="registerForm.gender" class="form-select">

<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

</div>

<div class="mb-3">

<label>Phone</label>

<input v-model="registerForm.phone" class="form-control">

</div>

</div>



<!-- COMPANY FIELDS -->

<div v-if="registerForm.role==='company'">

<div class="mb-3">

<label>Company Name</label>

<input v-model="registerForm.company_name" class="form-control">

</div>

<div class="mb-3">

<label>Phone</label>

<input v-model="registerForm.phone" class="form-control">

</div>

</div>



<!-- EMPLOYEE FIELDS -->

<div v-if="registerForm.role==='employee'">

<div class="mb-3">

<label>Employee Username</label>

<input v-model="registerForm.email" class="form-control">

</div>

</div>


<div class="mb-3">

<label>Password</label>

<input type="password" v-model="registerForm.password" class="form-control" required>

</div>


<button class="btn btn-success w-100">

Register

</button>

</form>


<p class="text-center mt-3">

Already registered?

<button class="btn btn-link p-0" @click="mode='login'">

Login

</button>

</p>

</div>



</div>

</div>

</div>

</div>




<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>

<script src="/static/login.js"></script>


</body>
</html>
